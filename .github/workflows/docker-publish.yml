name: Docker

on:
  push:
    branches: [ "**" ]
    tags:
      - "backend-v*.*.*"
      - "frontend-v*.*.*"
  pull_request:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE_NAME: ${{ github.repository_owner }}/toniq-backend
  FRONTEND_IMAGE_NAME: ${{ github.repository_owner }}/toniq-frontend

jobs:
  backend:
    if: github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/frontend-v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run tests
        run: ./gradlew --no-daemon test

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@59acb6260d9c0ba8f4a2f9d9b48431a222b68e20 # v3.5.0
        with:
          cosign-release: "v2.2.4"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare backend tags
        id: meta
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}
        run: |
          set -euo pipefail

          ref_name="${GITHUB_REF_NAME}"
          sha_short="$(git rev-parse --short HEAD)"
          tags=()

          sanitize_tag() {
            printf '%s' "$1" \
              | tr '[:upper:]' '[:lower:]' \
              | sed -E 's#[^a-z0-9._-]+#-#g; s#-+#-#g; s#(^-|-$)##g'
          }

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version=""
            if [[ "$ref_name" =~ ^backend-v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
              version="${BASH_REMATCH[1]}"
            fi
            [[ -n "$version" ]] || {
              echo "Unsupported backend tag: $ref_name" >&2
              exit 1
            }
            tags+=("${IMAGE}:${version}")
          elif [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            tags+=("${IMAGE}:pr-${{ github.event.number }}")
            tags+=("${IMAGE}:sha-${sha_short}")
          else
            branch_tag="$(sanitize_tag "$ref_name")"
            tags+=("${IMAGE}:${branch_tag}")
            tags+=("${IMAGE}:sha-${sha_short}")
            tags+=("${IMAGE}:sha-${GITHUB_SHA}")
            if [[ "$ref_name" == "main" ]]; then
              tags+=("${IMAGE}:latest")
            fi
          fi

          {
            echo "tags<<EOF"
            printf '%s\n' "${tags[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push backend image
        id: build-and-push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Sign the published backend image
        if: ${{ github.event_name != 'pull_request' }}
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
        run: echo "${TAGS}" | xargs -I {} cosign sign --yes {}@${DIGEST}

  frontend:
    if: github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/backend-v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "23"

      - name: Run frontend tests
        working-directory: frontend
        run: node --test

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@59acb6260d9c0ba8f4a2f9d9b48431a222b68e20 # v3.5.0
        with:
          cosign-release: "v2.2.4"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare frontend tags
        id: meta
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}
        run: |
          set -euo pipefail

          ref_name="${GITHUB_REF_NAME}"
          sha_short="$(git rev-parse --short HEAD)"
          tags=()

          sanitize_tag() {
            printf '%s' "$1" \
              | tr '[:upper:]' '[:lower:]' \
              | sed -E 's#[^a-z0-9._-]+#-#g; s#-+#-#g; s#(^-|-$)##g'
          }

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version=""
            if [[ "$ref_name" =~ ^frontend-v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
              version="${BASH_REMATCH[1]}"
            fi
            [[ -n "$version" ]] || {
              echo "Unsupported frontend tag: $ref_name" >&2
              exit 1
            }
            tags+=("${IMAGE}:${version}")
          elif [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            tags+=("${IMAGE}:pr-${{ github.event.number }}")
            tags+=("${IMAGE}:sha-${sha_short}")
          else
            branch_tag="$(sanitize_tag "$ref_name")"
            tags+=("${IMAGE}:${branch_tag}")
            tags+=("${IMAGE}:sha-${sha_short}")
            tags+=("${IMAGE}:sha-${GITHUB_SHA}")
            if [[ "$ref_name" == "main" ]]; then
              tags+=("${IMAGE}:latest")
            fi
          fi

          {
            echo "tags<<EOF"
            printf '%s\n' "${tags[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push frontend image
        id: build-and-push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: frontend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Sign the published frontend image
        if: ${{ github.event_name != 'pull_request' }}
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
        run: echo "${TAGS}" | xargs -I {} cosign sign --yes {}@${DIGEST}
