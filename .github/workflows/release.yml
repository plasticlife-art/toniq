name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version in X.Y.Z format
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Validate version
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          if [[ ! "$RELEASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version must match X.Y.Z"
            exit 1
          fi

          if git show-ref --tags --verify --quiet "refs/tags/v$RELEASE_VERSION"; then
            echo "Tag v$RELEASE_VERSION already exists"
            exit 1
          fi

      - name: Update project version
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          current_version="$(grep '^version=' gradle.properties | cut -d= -f2-)"
          if [[ "$current_version" == "$RELEASE_VERSION" ]]; then
            echo "Project is already at version $RELEASE_VERSION"
            exit 1
          fi
          sed -i.bak "s/^version=.*/version=$RELEASE_VERSION/" gradle.properties
          rm -f gradle.properties.bak

      - name: Commit release version
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add gradle.properties
          git commit -m "Release v$RELEASE_VERSION"

      - name: Create and push tag
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          git tag -a "v$RELEASE_VERSION" -m "Release v$RELEASE_VERSION"
          git push origin HEAD:main
          git push origin "v$RELEASE_VERSION"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ inputs.version }}
            ghcr.io/${{ github.repository }}:latest

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: v${{ inputs.version }}
          generate_release_notes: true
