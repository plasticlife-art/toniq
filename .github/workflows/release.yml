name: Release

on:
  push:
    tags:
      - "backend-v*.*.*"
      - "frontend-v*.*.*"
  workflow_dispatch:
    inputs:
      target:
        description: Release target
        required: true
        type: choice
        options:
          - backend
          - frontend
      version:
        description: Release version in X.Y.Z format
        required: true
        type: string
      git_ref:
        description: Git ref to tag
        required: false
        default: main
        type: string

permissions:
  contents: write

jobs:
  create_tag:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Validate release inputs
        env:
          RELEASE_TARGET: ${{ inputs.target }}
          RELEASE_VERSION: ${{ inputs.version }}
          RELEASE_GIT_REF: ${{ inputs.git_ref }}
        run: |
          set -euo pipefail

          if [[ ! "$RELEASE_TARGET" =~ ^(backend|frontend)$ ]]; then
            echo "Target must be backend or frontend"
            exit 1
          fi

          if [[ ! "$RELEASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version must match X.Y.Z"
            exit 1
          fi

          git fetch --prune --tags origin "+refs/heads/*:refs/remotes/origin/*"
          git rev-parse --verify "origin/$RELEASE_GIT_REF" >/dev/null 2>&1 || \
            git rev-parse --verify "$RELEASE_GIT_REF" >/dev/null 2>&1 || {
              echo "Git ref not found: $RELEASE_GIT_REF"
              exit 1
            }

          release_tag="${RELEASE_TARGET}-v${RELEASE_VERSION}"
          if git show-ref --tags --verify --quiet "refs/tags/$release_tag"; then
            echo "Tag already exists: $release_tag"
            exit 1
          fi

      - name: Create and push release tag
        env:
          RELEASE_TARGET: ${{ inputs.target }}
          RELEASE_VERSION: ${{ inputs.version }}
          RELEASE_GIT_REF: ${{ inputs.git_ref }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          release_tag="${RELEASE_TARGET}-v${RELEASE_VERSION}"
          target_ref="$RELEASE_GIT_REF"
          if git rev-parse --verify "origin/$target_ref" >/dev/null 2>&1; then
            target_ref="origin/$target_ref"
          fi

          git tag -a "$release_tag" "$target_ref" -m "Release $release_tag"
          git push origin "$release_tag"

  publish_release:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Derive release metadata
        id: meta
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if [[ "$REF_NAME" =~ ^(backend|frontend)-v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            echo "target=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
            echo "version=${BASH_REMATCH[2]}" >> "$GITHUB_OUTPUT"
          else
            echo "Unsupported release tag: $REF_NAME" >&2
            exit 1
          fi

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ steps.meta.outputs.target }} v${{ steps.meta.outputs.version }}
          generate_release_notes: true
