services:
  frontend-dev:
    image: nginx:1.27-alpine
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:${FRONTEND_DEV_PORT:-8081}:80"
    volumes:
      - ./frontend/nginx/dev.default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/src:/usr/share/nginx/html:ro
    restart: unless-stopped
