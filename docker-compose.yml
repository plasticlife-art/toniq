services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-toniq}
      POSTGRES_USER: ${POSTGRES_USER:-toniq}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-toniq}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB} -h 127.0.0.1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${APP_IMAGE_REPOSITORY:-toniq}:${APP_IMAGE_TAG:-local}
    depends_on:
      db:
        condition: service_healthy
    environment:
      JAVA_TOOL_OPTIONS: -Dvaadin.productionMode=true
      MAIN_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-toniq}
      MAIN_DATASOURCE_USERNAME: ${POSTGRES_USER:-toniq}
      MAIN_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-toniq}
      MEGATIX_BASE_URL: ${MEGATIX_BASE_URL:-}
      MEGATIX_EMAIL: ${MEGATIX_EMAIL:-}
      MEGATIX_PASSWORD: ${MEGATIX_PASSWORD:-}
      MEGATIX_WEBHOOK_SIGNATURE: ${MEGATIX_WEBHOOK_SIGNATURE:-}
      MEGATIX_TOKEN_REFRESH_SKEW_SECONDS: ${MEGATIX_TOKEN_REFRESH_SKEW_SECONDS:-30}
      SERVER_PORT: 8080
      VAADIN_LAUNCH_BROWSER: "false"
    ports:
      - "127.0.0.1:${APP_PORT:-8080}:8080"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    image: ${FRONTEND_IMAGE_REPOSITORY:-toniq-frontend}:${FRONTEND_IMAGE_TAG:-local}
    depends_on:
      app:
        condition: service_started
    environment:
      PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:-/api/public}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-8081}:80"
    restart: unless-stopped

  caddy:
    image: caddy:2
    depends_on:
      app:
        condition: service_started
      frontend:
        condition: service_healthy
    environment:
      ADMIN_DOMAIN: ${ADMIN_DOMAIN:-admin.localhost}
      PUBLIC_DOMAIN: ${PUBLIC_DOMAIN:-localhost}
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped

volumes:
  postgres-data:
  caddy-data:
  caddy-config:
