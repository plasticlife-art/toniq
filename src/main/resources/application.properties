main.datasource.url=${MAIN_DATASOURCE_URL:jdbc:hsqldb:file:.jmix/hsqldb/toniq}
main.datasource.username=${MAIN_DATASOURCE_USERNAME:sa}
main.datasource.password=${MAIN_DATASOURCE_PASSWORD:}

main.liquibase.change-log=app/rubeton/toniq/liquibase/changelog.xml

jmix.ui.login-view-id=LoginView
jmix.ui.main-view-id=MainView
jmix.ui.menu-config=app/rubeton/toniq/menu.xml
jmix.ui.composite-menu=true

ui.login.defaultUsername=admin
ui.login.defaultPassword=admin

jmix.core.available-locales=en

# Launch the default browser when starting the application in development mode
vaadin.launch-browser=false

# Enable colors in logs
spring.output.ansi.enabled=always

# 'debug' level logs SQL generated by EclipseLink ORM
logging.level.eclipselink.logging.sql=info

# 'debug' level logs data store operations
logging.level.io.jmix.core.datastore=info

# 'debug' level logs access control constraints
logging.level.io.jmix.core.AccessLogger=debug

# 'debug' level logs all Jmix debug output
logging.level.io.jmix=info

# 'debug' or 'trace' levels help to troubleshoot security problems
logging.level.org.springframework.security=info

logging.level.org.atmosphere=warn

megatix.base-url=${MEGATIX_BASE_URL:}
megatix.email=${MEGATIX_EMAIL:}
megatix.password=${MEGATIX_PASSWORD:}
megatix.webhook-signature=${MEGATIX_WEBHOOK_SIGNATURE:}
megatix.token-refresh-skew-seconds=${MEGATIX_TOKEN_REFRESH_SKEW_SECONDS:30}

toniq.background-refresh.enabled=${TONIQ_BACKGROUND_REFRESH_ENABLED:true}
toniq.background-refresh.metadata-fixed-delay-ms=${TONIQ_BACKGROUND_REFRESH_METADATA_DELAY_MS:600000}
toniq.background-refresh.availability-fixed-delay-ms=${TONIQ_BACKGROUND_REFRESH_AVAILABILITY_DELAY_MS:180000}
